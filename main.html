<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Better Instagram</title>
    <style>
     
      div.container {
        border: 5px solid #555;
      }

      .flex {
        display: flex;
        justify-content: space-around;
        align-items: center;
        gap: 10px;
      }
      .selected {
        border: 5px solid rgb(0, 195, 255);
      }

      p {
        text-align: center;
      }
      
      h4 {
        position: absolute;
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center">Arrange Images by drag and drop</h1>
    <div class="flex container" id="parent">
      <div draggable="true" class="image" id="div1">
        <h4>Image 1</h4>
        <img src="https://picsum.photos/id/237/50/300" alt="" />
      </div>
      <div draggable="true" class="image" id="div2">
        <h4>Image 2</h4>
        <img src="https://picsum.photos/seed/picsum/50/300" alt="" />
      </div>
      <div draggable="true" class="image" id="div3">
        <h4>Image 3</h4>
        <img src="https://picsum.photos/50/300?grayscale" alt="" />
      </div>
      <div draggable="true" class="image" id="div4">
        <h4>Image 4</h4>
        <img src="https://picsum.photos/50/300/" alt="" />
      </div>
      <div draggable="true" class="image" id="div5">
        <h4>Image 5</h4>
        <img src="https://picsum.photos/50/300.jpg" alt="" />
      </div>
      <div draggable="true" class="image" id="div6">
        <h4>Image 6</h4>
        <img src="https://picsum.photos/id/102/50/300" alt="" />
      </div>
    </div>

    <script>
      let images = document.querySelectorAll(".image");

      let draggedElement = null;

      for (let img of images) {
        img.addEventListener("dragstart", () => {
          draggedElement = img;
        });

        img.addEventListener("dragover", (e) => {
          e.preventDefault();
        });

        img.addEventListener("drop", (e) => {
          e.preventDefault();

          if (draggedElement === img) return;

          let parent = img.parentNode;

          let draggedNext = draggedElement.nextSibling;
          let targetNext = img.nextSibling;

          parent.insertBefore(draggedElement, targetNext);
          parent.insertBefore(img, draggedNext);
        });
      }
    </script>
  </body>
</html>
