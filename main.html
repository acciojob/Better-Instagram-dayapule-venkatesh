<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Better Instagram</title>
    <style>
      #div1 {
        background-image: url("https://picsum.photos/id/237/200/300");
        height: 300px;
        width: 200px;
        margin: 20px;
      }

      #div2 {
        background-image: url("https://picsum.photos/seed/picsum/200/300");
        height: 300px;
        width: 200px;
        margin: 20px;
      }

      #div3 {
        background-image: url("https://picsum.photos/200/300?grayscale");
        height: 300px;
        width: 200px;
        margin: 20px;
      }

      #div4 {
        background-image: url("https://picsum.photos/200/300/");
        height: 300px;
        width: 200px;
        margin: 20px;
      }

      #div5 {
        background-image: url("https://picsum.photos/200/300.jpg");
        height: 300px;
        width: 200px;
        margin: 20px;
      }

      #div6 {
        background-image: url("https://picsum.photos/id/102/200/300");
        height: 300px;
        width: 200px;
        margin: 20px;
      }

      div.container {
        border: 5px solid #555;
      }

      .flex {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .selected {
        border: 5px solid rgb(0, 195, 255);
      }

      p {
        text-align: center;
      }

      button {
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center">Arrange Images by drag and drop</h1>
  <div class="flex container" id="parent">
      <div draggable="true" class="image" id="div1">Image 1</div>
      <div draggable="true" class="image" id="div2">Image 2</div>
      <div draggable="true" class="image" id="div3">Image 3</div>
      <div draggable="true" class="image" id="div4">Image 4</div>
      <div draggable="true" class="image" id="div5">Image 5</div>
      <div draggable="true" class="image" id="div6">Image 6</div>
    </div>

    <script>
        let images = document.querySelectorAll(".image");

let draggedElement = null;

for (let img of images) {

    img.addEventListener("dragstart", () => {
        draggedElement = img;
    });

    img.addEventListener("dragover", (e) => {
        e.preventDefault();
    });

    img.addEventListener("drop", (e) => {
        e.preventDefault();

        if (draggedElement === img) return;

        let parent = img.parentNode;

        let draggedNext = draggedElement.nextSibling;
        let targetNext = img.nextSibling;

        parent.insertBefore(draggedElement, targetNext);
        parent.insertBefore(img, draggedNext);
    });
}
    </script>
  </body>
</html>
